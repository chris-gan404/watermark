[DEFAULT]
host = localhost
port = 15050
debug = False
input_folder = ./input
output_folder = ./output
override_existed = False
supported_file_suffixes = .jpeg,.jpg,.png,.heic
quality = 100
subsampling = 0

[render]
template_name = 文件夹名+右下角参数

[geocoding]
enabled = True
endpoint = https://nominatim.openstreetmap.org/reverse
language = en
user_agent = semi-utils/2.1.5 (local photo metadata tool)
timeout = 8
